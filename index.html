<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Rack Elite</title>
    <style>
        :root { --accent: #8b5cf6; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; padding-bottom: 120px; }
        .glass-card { background: var(--glass); padding: 24px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); max-width: 450px; margin: auto; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 0.9rem; box-sizing: border-box; margin-bottom: 8px; }
        .btn { padding: 14px; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 5px; }
        .add-btn { background: #3b82f6; color: white; }
        .save-btn { background: var(--accent); color: white; }
        .list-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2 style="text-align:center">Display Rack Calc</h2>
    <div class="input-row">
        <div><label>Channel Height</label><input type="number" id="chH" placeholder="6"></div>
        <div><label>Channel Qty</label><input type="number" id="chQ" placeholder="1"></div>
    </div>
    <select id="chThick">
        <option value="0.220">Channel 1.5mm (0.220 kg/ft)</option>
        <option value="0.300">Channel 2mm (0.3 kg/ft)</option>
    </select>

    <div style="border: 1px solid #e2e8f0; padding: 10px; border-radius: 15px; margin: 10px 0;">
        <label>Add Shelves</label>
        <select id="gauge">
            <option value="24">24 Gauge</option>
            <option value="22">22 Gauge</option>
            <option value="20" selected>20 Gauge (Default)</option>
            <option value="18">18 Gauge</option>
        </select>
        <div class="input-row">
            <select id="shelfDepth">
                <option value="12">Depth 12"</option>
                <option value="15">Depth 15"</option>
                <option value="18">Depth 18"</option>
                <option value="23">Depth 23"</option>
            </select>
            <input type="number" id="shelfQty" placeholder="Qty">
        </div>
        <select id="bThick">
            <option value="16">Bracket 2mm (16/in)</option>
            <option value="20">Bracket 2.5mm (20/in)</option>
        </select>
        <button class="btn add-btn" onclick="addToRack()">Add to Rack</button>
    </div>

    <div id="rackList"></div>
    <div class="input-row" style="margin-top:15px">
        <div><label>Nameplate Length</label><input type="number" id="npL" placeholder="3"></div>
        <div><label>Rate / KG</label><input type="number" id="rate" placeholder="100"></div>
    </div>

    <button class="btn save-btn" onclick="calcFinal()">Calculate Total</button>
    <div id="finalRes" style="margin-top:20px; font-weight:bold; text-align:center; font-size:1.1rem; color: #1e293b;"></div>
</div>

<script>
    let rackItems = [];
    function addToRack() {
        const depth = document.getElementById('shelfDepth').value;
        const qty = parseInt(document.getElementById('shelfQty').value);
        const bThick = parseInt(document.getElementById('bThick').value);
        const gauge = document.getElementById('gauge').value;

        // Weight Table mapping based on photo (Gauge vs Depth)
        const weights = {
            '24': {'12': 1.63, '15': 1.96, '18': 2.30, '23': 2.95},
            '22': {'12': 1.89, '15': 2.27, '18': 2.66, '23': 3.42},
            '20': {'12': 2.15, '15': 2.59, '18': 3.03, '23': 3.90}, // 20 Gauge Default
            '18': {'12': 2.67, '15': 3.22, '18': 3.77, '23': 4.85}
        };
        
        const weight = weights[gauge][depth] * qty;
        rackItems.push({depth, qty, bCost: depth * bThick * 2, weight});
        renderList();
    }

    function renderList() {
        document.getElementById('rackList').innerHTML = rackItems.map((item, i) => 
            `<div class="list-item"><span>${item.qty}x Depth ${item.depth}"</span> <span>₹${item.bCost}</span></div>`).join('');
    }

    function calcFinal() {
        const chH = document.getElementById('chH').value;
        const chQ = document.getElementById('chQ').value;
        const chT = document.getElementById('chThick').value;
        const npL = document.getElementById('npL').value;
        const rate = document.getElementById('rate').value;

        let totalWeight = (chH * chQ * chT) + rackItems.reduce((acc, curr) => acc + curr.weight, 0);
        let totalBracketCost = rackItems.reduce((acc, curr) => acc + curr.bCost, 0);
        let nameplateCost = (35 * npL * rackItems.reduce((acc, curr) => acc + curr.qty, 0));
        let grandTotal = (totalWeight * rate) + totalBracketCost + nameplateCost;
        
        document.getElementById('finalRes').innerText = `Grand Total (Incl. 18% GST): ₹${Math.round(grandTotal * 1.18).toLocaleString('en-IN')}`;
    }
</script>
</body>
</html>
